name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'GymSup-BE/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        working-directory: GymSup-BE
        run: dotnet restore BE.sln

      - name: Build
        working-directory: GymSup-BE
        run: dotnet build BE.sln --configuration Release --no-restore

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/gymsupport/source
            git fetch origin main
            git reset --hard origin/main
            cd GymSup-BE
            docker compose up -d --build
